services:
  - type: web
    name: temptalk-xwes
    runtime: node
    rootDir: server
    buildCommand: npm ci --omit=dev --no-audit --fund=false
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        value: https://temptalk-1.onrender.com
      - key: PUBLIC_CLIENT_URL
        value: https://temptalk-1.onrender.com
      - key: CORS_ORIGIN
        value: https://temptalk-1.onrender.com
      - key: ROOM_TTL_MINUTES
        value: 1440
      - key: MESSAGE_TTL_MINUTES
        value: 1440
      - key: MAX_ROOM_PEERS
        value: 2
      - key: MAX_GROUP_PEERS
        value: 12
      - key: ABSOLUTE_MAX_GROUP_PEERS
        value: 100
      - key: MESSAGE_HISTORY_LIMIT
        value: 1000
      - key: SEEN_BATCH_LIMIT
        value: 500
      - key: MAX_ATTACHMENT_MB
        value: 50

  - type: web
    name: temptalk-1
    runtime: static
    rootDir: client
    buildCommand: npm ci --include=dev --no-audit --fund=false && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://temptalk-xwes.onrender.com
      - key: VITE_MAX_ATTACHMENT_MB
        value: 50
      - key: VITE_APK_URL
        value: https://github.com/mahendra0011/TempTalk/releases/download/apk-latest/TempTalk.apk
      - key: VITE_PUBLIC_CLIENT_URL
        value: https://temptalk-1.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
